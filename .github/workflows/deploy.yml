name: Deploy to Cloud Run

on:
  pull_request:
  push:
    branches: [main]

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            NEXT_PUBLIC_API_URL:hr-app-475516/NEXT_PUBLIC_API_URL
            NEXT_PUBLIC_FIREBASE_API_KEY:hr-app-475516/NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:hr-app-475516/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID:hr-app-475516/NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:hr-app-475516/NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:hr-app-475516/NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            NEXT_PUBLIC_FIREBASE_APP_ID:hr-app-475516/NEXT_PUBLIC_FIREBASE_APP_ID
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:hr-app-475516/NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
            NEXT_PUBLIC_FIREBASE_VAPID_KEY:hr-app-475516/NEXT_PUBLIC_FIREBASE_VAPID_KEY
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY:hr-app-475516/NEXT_PUBLIC_RECAPTCHA_SITE_KEY

      - env:
          NEXT_PUBLIC_API_URL: ${{ steps.secrets.outputs.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${{ steps.secrets.outputs.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ steps.secrets.outputs.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
        run: make build-image

      - run: make build-image-push
      - run: make build-image-push-build-stage

  deploy:
    concurrency:
      group: deploy-lock
      cancel-in-progress: false
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: make build-image-pull
      - run: make build-image-promote

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: app-hr-com
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/app-hr-com:${{ github.sha }}
          flags: "--allow-unauthenticated"
